name: fintrack

services:

  postgres:
    image: postgres:18.3
    ports:
      - "5432:5432"
    shm_size: 128mb
    volumes:
      - postgres-data:/var/lib/postgresql
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    restart: always

volumes:
  postgres-data: